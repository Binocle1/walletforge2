<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Votre Carte de Fidélité</title>
  <style>
    :root { --pine: #16453a; --bg: #f9fbfb; --text: #1a1a2e; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { max-width: 400px; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    h1 { margin-top: 0; font-size: 22px; color: var(--pine); }
    p { color: #666; margin-bottom: 30px; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 12px; box-sizing: border-box; }
    .btn.apple { background: #000; color: #fff; }
    .btn.google { background: #fff; color: #3c4043; border: 1px solid #dadce0; }
    .btn.google:hover { background: #f8f9fa; }
    .secondary { font-size: 14px; color: #666; text-decoration: underline; background: none; border: none; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="loading">Chargement de votre carte...</div>
    <div id="content" style="display: none;">
      <h1>Bonjour <span id="cName"></span> !</h1>
      <p>Voici votre carte de fidélité pour <b><span id="bName"></span></b>.</p>
      
      <div id="btn-apple" style="display: none;">
        <a href="#" id="linkApple" class="btn apple">Ajouter à Apple Wallet</a>
      </div>
      
      <div id="btn-google" style="display: none;">
        <button id="linkGoogle" class="btn google">Ajouter à Google Wallet</button>
      </div>

      <button class="secondary" onclick="showBoth()">J'ai un autre type de téléphone</button>
    </div>
    <div id="error" style="display: none; color: #d93025;">Carte introuvable.</div>
  </div>

  <script>
    const serial = location.pathname.split('/').pop();
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    let passId = null;

    async function loadCard() {
      try {
        const r = await fetch('/api/wallet/pass-info/' + serial);
        if (!r.ok) throw new Error('Not found');
        const data = await r.json();
        passId = data.pass_id;
        
        document.getElementById('cName').textContent = data.first_name;
        document.getElementById('bName').textContent = data.business_name;
        
        document.getElementById('linkApple').href = '/api/wallet/apple/' + passId + '.pkpass';
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        if (isIOS) {
          document.getElementById('btn-apple').style.display = 'block';
        } else {
          document.getElementById('btn-google').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      }
    }

    document.getElementById('linkGoogle').addEventListener('click', async () => {
      document.getElementById('linkGoogle').textContent = 'Création en cours...';
      try {
        const r = await fetch('/api/wallet/google/' + passId);
        const data = await r.json();
        if (data.url) location.href = data.url;
        else alert('Erreur Google Wallet');
      } catch (e) { alert('Erreur réseau'); }
      document.getElementById('linkGoogle').textContent = 'Ajouter à Google Wallet';
    });

    function showBoth() {
      document.getElementById('btn-apple').style.display = 'block';
      document.getElementById('btn-google').style.display = 'block';
    }

    loadCard();
  </script>
</body>
</html>
