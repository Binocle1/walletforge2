<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#10231f">
<link rel="manifest" href="manifest.json">
<title>WalletForge Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--ink:#10231f;--pine:#16453a;--mist:#eef4f1;--line:#d8e4de;--text:#22332e;--muted:#6b7f78;--amber:#c77f14;--ok:#1d8a5f;--danger:#c0392b}
*{box-sizing:border-box;margin:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--ink);color:#fff;min-height:100vh}
.page{max-width:460px;margin:0 auto;padding:18px}
h1,h2{font-family:Sora}
input{width:100%;font-size:16px;padding:13px;border-radius:10px;border:none;margin-top:10px}
button{font-family:Sora;font-weight:600;cursor:pointer;border:none;border-radius:12px}
.big{width:100%;padding:15px;font-size:16px;margin-top:14px;background:var(--amber);color:#fff}
.ghost{background:rgba(255,255,255,.1);color:#fff}
#reader{border-radius:16px;overflow:hidden;margin-top:14px;background:#000}
.hide{display:none!important}
.profile{background:#fff;color:var(--text);border-radius:16px;padding:20px;margin-top:16px}
.profile h2{color:var(--ink);font-size:20px}
.balance{display:flex;gap:10px;margin:14px 0}
.balance div{flex:1;background:var(--mist);border-radius:12px;padding:12px;text-align:center}
.balance b{display:block;font-size:24px;font-family:Sora;color:var(--pine)}
.balance small{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.actions button{padding:14px 8px;font-size:14.5px;border-radius:12px;background:var(--pine);color:#fff}
.actions button.warn{background:#fff;color:var(--danger);border:1.5px solid var(--danger)}
.actions button.gold{background:var(--amber)}
/* Zone de saisie : clavier NATIF du téléphone (inputmode=decimal) */
.amountBox{background:#1a332d;border-radius:14px;padding:14px;margin-top:14px}
.amountBox label{display:block;font-size:12px;color:#7fa094;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.amountBox input{width:100%;font-size:30px;font-family:Sora;text-align:center;padding:12px;
  border-radius:10px;border:2px solid #234a41;background:var(--ink);color:#fff;margin:0}
.amountBox input:focus{outline:none;border-color:var(--ok)}
.toastS{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:var(--ink);
  padding:14px 20px;border-radius:14px;font-weight:600;transition:.3s;width:90%;max-width:400px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.4);
  display:flex;justify-content:space-between;align-items:center;gap:10px}
.toastS.show{transform:translateX(-50%) translateY(0)}
.recent{font-size:12.5px;color:var(--muted);margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
.topbar{display:flex;justify-content:space-between;align-items:center}
.topbar small{color:#7fa094}
</style>
</head>
<body>
<div class="page">

  <!-- login -->
  <div id="pLogin">
    <h1 style="margin:30px 0 4px">Scanner</h1>
    <p style="color:#7fa094;font-size:14px">Connexion vendeur / manager</p>
    <input id="sEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="sPass" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="big" onclick="login()">Se connecter</button>
  </div>

  <!-- scan -->
  <div id="pScan" class="hide">
    <div class="topbar">
      <h1 style="font-size:20px">Scanner une carte</h1>
      <button class="ghost" style="padding:8px 14px" onclick="logout()">Quitter</button>
    </div>
    <div id="reader"></div>
    <input id="manual" placeholder="Ou recherche : nom, email, téléphone…" style="border:none" oninput="search(this.value)">
    <div id="results"></div>
  </div>

  <!-- profil client -->
  <div id="pProfile" class="hide">
    <button class="ghost" style="padding:9px 16px" onclick="backToScan()">← Scanner</button>
    <div class="profile">
      <h2 id="cName"></h2>
      <p style="color:var(--muted);font-size:13.5px" id="cProg"></p>
      <div class="balance" id="cBalance"></div>

      <!-- Clavier natif du téléphone : pas de pavé maison -->
      <div class="amountBox" id="amountBox">
        <label id="amountLabel">Montant de l'achat (€)</label>
        <input id="amount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00">
      </div>

      <div class="actions" id="cActions"></div>

      <div class="recent" id="cRecent"></div>
    </div>
  </div>
</div>

<!-- Numpad -->
<div class="toastS" id="toastS">
  <span id="toastMsg"></span>
  <button id="toastUndoBtn" class="hide" style="padding:6px 12px;background:#c0392b;color:#fff;font-size:13px" onclick="undoTx()">Annuler</button>
</div>

<script>
let TOKEN = localStorage.getItem('wf_scan_token');
let current = null;  // {pass_id, type, ...}
let scanner = null;

async function api(path, opts = {}) {
  if (!navigator.onLine) {
    if (path === '/transactions' && opts.method === 'POST') {
      const q = JSON.parse(localStorage.getItem('wf_queue') || '[]');
      const offline_id = 'off_' + Date.now();
      opts.body.offline_id = offline_id;
      q.push(opts.body);
      localStorage.setItem('wf_queue', JSON.stringify(q));
      return { ok: true, tx_id: offline_id, message: 'Hors-ligne : action sauvegardée', pass: { stamps: current.stamps, points: current.points, rewards_available: current.rewards_available } };
    }
    if (path.startsWith('/transactions/') && opts.method === 'DELETE') {
      const txId = path.split('/').pop();
      let q = JSON.parse(localStorage.getItem('wf_queue') || '[]');
      q = q.filter(t => t.offline_id !== txId);
      localStorage.setItem('wf_queue', JSON.stringify(q));
      return { ok: true };
    }
  }
  const res = await fetch('/api' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erreur');
  return data;
}

window.addEventListener('online', syncQueue);
async function syncQueue() {
  const q = JSON.parse(localStorage.getItem('wf_queue') || '[]');
  if (!q.length) return;
  toast('Synchronisation hors-ligne...');
  for (const tx of q) {
    const body = { ...tx };
    delete body.offline_id;
    await fetch('/api/transactions', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN }, body: JSON.stringify(body) }).catch(()=>{});
  }
  localStorage.removeItem('wf_queue');
  toast(`${q.length} action(s) synchronisée(s) !`);
}

function show(id) {
  ['pLogin', 'pScan', 'pProfile'].forEach(p => document.getElementById(p).classList.toggle('hide', p !== id));
}

function toast(msg, err = false, txId = null) {
  const t = document.getElementById('toastS');
  document.getElementById('toastMsg').textContent = msg;
  const undoBtn = document.getElementById('toastUndoBtn');
  if (txId) {
    undoBtn.classList.remove('hide');
    undoBtn.dataset.tx = txId;
  } else {
    undoBtn.classList.add('hide');
  }
  t.style.background = err ? 'var(--danger)' : '#fff';
  t.style.color = err ? '#fff' : 'var(--ink)';
  t.classList.add('show'); 
  clearTimeout(t.timer);
  t.timer = setTimeout(() => t.classList.remove('show'), 6000);
}

const esc = (s) => String(s != null ? s : '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function login() {
  const urlParams = new URLSearchParams(window.location.search);
  const tenantId = urlParams.get('t');
  
  try {
    const r = await api('/auth/login', { 
      method: 'POST', 
      body: { 
        email: document.getElementById('sEmail').value, 
        password: document.getElementById('sPass').value,
        tenant_id: tenantId 
      } 
    });
    TOKEN = r.token; localStorage.setItem('wf_scan_token', TOKEN);
    document.getElementById('sPass').value = '';
    startScan();
  } catch (e) { toast(e.message, 1); }
}
function logout() { localStorage.removeItem('wf_scan_token'); location.reload(); }

function camError(html) {
  document.getElementById('reader').innerHTML =
    '<div style="padding:18px;color:#7fa094;font-size:14px;line-height:1.5">' + html + '</div>';
}

async function startScan() {
  show('pScan');

  // Le scanner existe déjà : il est simplement EN PAUSE après le scan précédent.
  // (Avant : `if (scanner) return;` -> image gelée, plus aucun QR détecté.)
  if (scanner) {
    try {
      if (scanner.getState && scanner.getState() === 3 /* PAUSED */) scanner.resume();
    } catch (e) { console.warn('[scanner] resume', e); }
    return;
  }

  // 1) La librairie s'est-elle bien chargée ? (CDN bloqué, hors-ligne, CSP…)
  if (typeof Html5Qrcode === 'undefined') {
    camError("La librairie du scanner n'a pas pu se charger.<br>" +
             "Vérifie la connexion internet, puis recharge la page.<br>" +
             "La <b>recherche manuelle ci-dessous fonctionne quand même</b>.");
    return;
  }

  // 2) Contexte sécurisé obligatoire : sans HTTPS, le navigateur n'expose
  //    même pas la caméra (navigator.mediaDevices est undefined).
  if (!window.isSecureContext || !navigator.mediaDevices) {
    camError("La caméra exige une connexion sécurisée.<br>" +
             "Ouvre le scanner en <b>https://</b> (pas en http:// ni via une IP locale).<br>" +
             "En attendant, utilise la <b>recherche manuelle ci-dessous</b>.");
    return;
  }

  try {
    scanner = new Html5Qrcode('reader');
    await scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 230, height: 230 } },
      (text) => { scanner.pause(true); openSerial(text); },
      () => {}   // erreurs de décodage image par image : normal, on ignore
    );
  } catch (err) {
    scanner = null;                       // sinon on reste bloqué au prochain essai
    const name = (err && (err.name || err.message)) || String(err);
    let msg;
    if (String(name).includes('NotAllowedError'))      msg = "Accès à la caméra <b>refusé</b>.<br>Autorise la caméra dans les réglages du navigateur, puis recharge.";
    else if (String(name).includes('NotFoundError'))   msg = "Aucune caméra détectée sur cet appareil.";
    else if (String(name).includes('NotReadableError'))msg = "La caméra est déjà utilisée par une autre application. Ferme-la et recharge.";
    else                                              msg = "Erreur caméra : " + esc(String(name));
    console.error('[scanner]', err);
    camError(msg + "<br><br>La <b>recherche manuelle ci-dessous</b> reste disponible.");
  }
}

function backToScan() { startScan(); }

async function search(q) {
  if (q.length < 2) { document.getElementById('results').innerHTML = ''; return; }
  const rows = await api('/scan-search?q=' + encodeURIComponent(q)).catch(() => []);
  document.getElementById('results').innerHTML = rows.map(r =>
    `<button class="ghost" style="width:100%;padding:13px;margin-top:8px;text-align:left"
      onclick="openSerial('${r.serial_number}')">${esc(r.first_name)} ${esc(r.last_name || '')} — ${esc(r.program_name)}</button>`).join('');
}

function extractSerial(text) {
  const t = String(text || '').trim();
  // QR de la carte web : https://.../card/<serial>
  const m = t.match(/\/card\/([^/?#]+)/i);
  if (m) return decodeURIComponent(m[1]);
  // QR d'inscription scanné par erreur : https://.../join/<programId>
  if (/\/join\//i.test(t)) throw new Error("Ceci est le QR d'inscription du programme, pas la carte d'un client.");
  return t;
}

async function openSerial(raw) {
  let data, serial;
  try {
    serial = extractSerial(raw);
  } catch (e) {
    toast(e.message, 1);
    if (scanner) scanner.resume();
    return;
  }
  try {
    data = await api('/scan/' + encodeURIComponent(serial));
  } catch (e) {
    // Erreur réseau / carte inconnue : on reste sur le scanner
    toast(e.message, 1);
    if (scanner) scanner.resume();
    return;
  }
  try {
    current = data;
    renderProfile();
    show('pProfile');
  } catch (e) {
    // Erreur d'affichage : on ne doit PAS la confondre avec une carte invalide
    console.error('[renderProfile]', e);
    toast('Erreur d\'affichage du profil : ' + e.message, 1);
  }
}

function renderProfile() {
  const c = current;
  let badges = '';
  if (c.tags && c.tags.length) {
    const vip = c.tags.find(t => t.startsWith('VIP'));
    if (vip) badges += `<span style="background:var(--amber);color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:8px;vertical-align:middle">${vip}</span>`;
  }
  if (c.current_streak >= 1) {
    badges += `<span style="background:#ff6b6b;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:8px;vertical-align:middle">🔥 Streak: ${c.current_streak}</span>`;
  }
  document.getElementById('cName').innerHTML = `${esc(c.first_name)} ${esc(c.last_name || '')} ${badges}`;
  document.getElementById('cProg').textContent = c.program_name;
  let bal = '';
  if (c.type === 'stamps') {
    bal = `<div><b>${c.stamps}/${c.stamps_required}</b><small>Tampons</small></div><div><b>${c.rewards_available}</b><small>Récompenses</small></div>`;
  } else if (c.type === 'giftcard') {
    bal = `<div><b>${Number(c.points).toFixed(2)} €</b><small>Solde</small></div>`;
  } else {
    bal = `<div><b>${Number(c.points)}</b><small>Points</small></div><div><b>${c.rewards_available}</b><small>Récompenses</small></div>`;
  }
  document.getElementById('cBalance').innerHTML = bal;

  // Le champ montant n'a de sens que pour les programmes points / carte cadeau
  const needsAmount = c.type !== 'stamps';
  document.getElementById('amountBox').style.display = needsAmount ? '' : 'none';
  document.getElementById('amountLabel').textContent =
    c.type === 'giftcard' ? 'Montant en €' : 'Montant de l\'achat (€) ou nombre de points';
  clearAmount();

  const acts = [];
  if (c.type === 'stamps') {
    acts.push(`<button onclick="tx('purchase')">+ 1 tampon (achat)</button>`);
    acts.push(`<button class="warn" onclick="tx('remove_stamp')">− 1 tampon (corriger)</button>`);
  } else if (c.type === 'giftcard') {
    acts.push(`<button class="gold" onclick="txAmount('purchase')">− Débiter le montant</button>`);
    acts.push(`<button onclick="txAmount('add_points')">+ Recharger du montant</button>`);
  } else {
    // Programme à points : achat (€ -> points) + ajout/retrait manuel de points
    acts.push(`<button onclick="txAmount('purchase')">💶 Achat : convertir le montant en points</button>`);
    acts.push(`<button onclick="txAmount('add_points')">+ Ajouter ce nombre de points</button>`);
    acts.push(`<button class="warn" onclick="txAmount('remove_points')">− Retirer ce nombre de points</button>`);
  }

  if (c.type !== 'giftcard') {
    if (c.automations && c.automations.multi_rewards && c.automations.multi_rewards.length > 0) {
      c.automations.multi_rewards.forEach(r => {
        const balance = c.type === 'stamps' ? c.stamps + (c.rewards_available * c.stamps_required) : Number(c.points);
        const canRedeem = balance >= r.threshold;
        acts.push(`<button class="gold" ${canRedeem ? '' : 'disabled style="opacity:.4"'} onclick="tx('reward_redeemed', ${r.threshold})">🎁 ${esc(r.label)} (${r.threshold} ${c.type === 'stamps' ? 'tampons' : 'pts'})</button>`);
      });
    } else {
      const canRedeem = c.type === 'stamps' ? c.rewards_available > 0 : Number(c.points) >= c.points_for_reward;
      acts.push(`<button class="gold" ${canRedeem ? '' : 'disabled style="opacity:.4"'} onclick="tx('reward_redeemed')">🎁 Utiliser la récompense</button>`);
    }
  }
  document.getElementById('cActions').innerHTML = acts.join('');

  document.getElementById('cRecent').innerHTML = '<b>Dernières actions</b><br>' +
    (c.recent || []).map(r => `${new Date(r.created_at).toLocaleString('fr-FR')} — ${esc(r.type)}${r.amount ? ' ' + r.amount + '€' : ''}`).join('<br>') || '';
}

// ---------- Actions : le montant vient du clavier NATIF (#amount) ----------
function readAmount() {
  const el = document.getElementById('amount');
  const v = Number(String(el.value).replace(',', '.'));
  if (!Number.isFinite(v) || v <= 0) {
    toast('Saisis un montant supérieur à 0', 1);
    el.focus();
    return null;
  }
  return Math.round(v * 100) / 100;
}
function clearAmount() { document.getElementById('amount').value = ''; }

// Action qui a besoin du champ montant
function txAmount(type) {
  const amount = readAmount();
  if (amount === null) return;
  tx(type, amount);
}

let returnTimer = null;
async function tx(type, amount) {
  try {
    const client_tx_id = crypto.randomUUID ? crypto.randomUUID() : ('ctx_' + Date.now() + '_' + Math.random().toString(36).slice(2));
    const r = await api('/transactions', { method: 'POST', body: { pass_id: current.pass_id, type, amount, client_tx_id } });
    toast(r.message, false, r.tx_id);
    current.stamps = r.pass.stamps; current.points = r.pass.points; current.rewards_available = r.pass.rewards_available;
    clearAmount();
    renderProfile();
    
    clearTimeout(returnTimer);
    returnTimer = setTimeout(() => startScan(), 2500);
  } catch (e) { toast(e.message, 1); }
}

async function undoTx() {
  const txId = document.getElementById('toastUndoBtn').dataset.tx;
  if (!txId) return;
  try {
    document.getElementById('toastS').classList.remove('show');
    clearTimeout(returnTimer);
    const r = await api('/transactions/' + txId, { method: 'DELETE' });
    toast('Action annulée avec succès', false);
    // Recharge le profil
    openSerial(current.serial_number);
  } catch (e) { toast(e.message, 1); }
}

if (TOKEN) { startScan(); syncQueue(); }
// Nettoyage : on désinstalle tout ancien service worker et on vide son cache.
// (Il servait une version périmée du scanner, et sa version "kill switch"
//  forçait un rechargement en boucle -> la page ne chargeait plus.)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations()
    .then((regs) => regs.forEach((r) => r.unregister()))
    .catch(() => {});
}
if (window.caches) {
  caches.keys().then((ks) => ks.forEach((k) => caches.delete(k))).catch(() => {});
}
</script>
</body>
</html>
